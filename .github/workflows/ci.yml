name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint log-ingestion
        run: flake8 services/log-ingestion/app/ --max-line-length=120 --ignore=E501,W503,E302,E303,W292,W291,W293,E301,E225,E304

      - name: Lint detection-service
        run: flake8 services/detection-service/app/ --max-line-length=120 --ignore=E501,W503,E302,E303,W292,W291,W293,E301,E225,E304

      - name: Lint alert-service
        run: flake8 services/alert-service/app/ --max-line-length=120 --ignore=E501,W503,E302,E303,W292,W291,W293,E301,E225,E304

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build log-ingestion
        uses: docker/build-push-action@v4
        with:
          context: ./services/log-ingestion
          push: false
          tags: log-ingestion:test

      - name: Build detection-service
        uses: docker/build-push-action@v4
        with:
          context: ./services/detection-service
          push: false
          tags: detection-service:test

      - name: Build alert-service
        uses: docker/build-push-action@v4
        with:
          context: ./services/alert-service
          push: false
          tags: alert-service:test

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Create .env files
        run: |
          echo "DATABASE_URL=postgresql://postgres:testpassword@postgres:5432/logs" > services/log-ingestion/.env
          echo "REDIS_HOST=redis" >> services/log-ingestion/.env
          echo "REDIS_PORT=6379" >> services/log-ingestion/.env
          echo "DATABASE_URL=postgresql://postgres:testpassword@postgres:5432/logs" > services/detection-service/.env
          echo "REDIS_HOST=redis" >> services/detection-service/.env
          echo "REDIS_PORT=6379" >> services/detection-service/.env
          echo "DATABASE_URL=postgresql://postgres:testpassword@postgres:5432/logs" > services/alert-service/.env

      - name: Create test docker-compose
        run: |
          cat > docker-compose.test.yml << 'EOF'
          services:
            postgres:
              image: postgres:15
              environment:
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: testpassword
                POSTGRES_DB: logs
              volumes:
                - ./init.sql:/docker-entrypoint-initdb.d/init.sql
              healthcheck:
                test: ["CMD", "pg_isready", "-U", "postgres"]
                interval: 5s
                timeout: 5s
                retries: 5

            redis:
              image: redis:7
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 5s
                timeout: 5s
                retries: 5

            log-ingestion:
              build: ./services/log-ingestion
              environment:
                DATABASE_URL: postgresql://postgres:testpassword@postgres:5432/logs
                REDIS_HOST: redis
                REDIS_PORT: 6379
              ports:
                - "8000:8000"
              depends_on:
                postgres:
                  condition: service_healthy
                redis:
                  condition: service_healthy

            alert-service:
              build: ./services/alert-service
              environment:
                DATABASE_URL: postgresql://postgres:testpassword@postgres:5432/logs
              ports:
                - "8002:8002"
              depends_on:
                postgres:
                  condition: service_healthy
          EOF

      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for log-ingestion..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/docs > /dev/null; then
              echo "log-ingestion is up"
              break
            fi
            sleep 2
          done

          echo "Waiting for alert-service..."
          for i in {1..30}; do
            if curl -sf http://localhost:8002/alerts > /dev/null; then
              echo "alert-service is up"
              break
            fi
            sleep 2
          done

      - name: Test log ingestion endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/logs \
            -H "Content-Type: application/json" \
            -d '{"source_ip":"1.2.3.4","destination_ip":"5.6.7.8","port":22,"bytes_sent":100,"protocol":"TCP"}')
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "FAIL: Expected 200, got $response"
            docker compose -f docker-compose.test.yml logs
            exit 1
          fi
          echo "PASS: Log ingestion working"

      - name: Test alert service endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8002/alerts)
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "FAIL: Expected 200, got $response"
            exit 1
          fi
          echo "PASS: Alert service working"

      - name: Test metrics endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/metrics)
          if [ "$response" != "200" ]; then
            echo "FAIL: Metrics endpoint not working"
            exit 1
          fi
          echo "PASS: Metrics endpoint working"

      - name: Print logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down